<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso · Brootal Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf9f7;
      --surface: #ffffff;
      --border: #e8e4dd;
      --border-strong: #d9d3ca;
      --text: #1a1916;
      --text-2: #5c5954;
      --text-3: #8a8680;
      --accent: oklch(0.55 0.22 280);
      --accent-soft: oklch(0.95 0.04 280);
      --accent-text: oklch(0.40 0.20 280);
      --danger: oklch(0.60 0.20 25);
      --danger-soft: oklch(0.96 0.04 25);
      --shadow: 0 4px 14px rgba(20,18,15,0.06), 0 1px 2px rgba(20,18,15,0.04);
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      width: 100%;
      max-width: 380px;
      padding: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    .brand { margin-bottom: 32px; }
    .brand-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
    .brand-sub { font-size: 13px; color: var(--text-2); }

    .form { display: flex; flex-direction: column; gap: 14px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 12px; font-weight: 600; color: var(--text-2); letter-spacing: 0.02em; text-transform: uppercase; }
    .input-wrap { position: relative; }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      height: 40px;
      padding: 0 40px 0 12px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: var(--surface);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="email"] { padding-right: 12px; }
    input:focus { border-color: var(--accent); }
    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 4px;
      display: grid;
      place-items: center;
    }
    .error-msg {
      font-size: 12.5px;
      color: var(--danger);
      font-weight: 500;
      display: none;
      padding: 8px 12px;
      background: var(--danger-soft);
      border-radius: 6px;
    }
    .error-msg.visible { display: block; }
    .submit-btn {
      margin-top: 6px;
      height: 42px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .submit-btn:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-title">Brootal Dashboard</div>
      <div class="brand-sub">Ingresá tus credenciales para continuar</div>
    </div>

    <form class="form" method="POST" action="/api/login">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.cl" required autofocus />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" required />
          <button type="button" class="toggle-pw" onclick="togglePw()" title="Mostrar/ocultar contraseña">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-msg" id="err">Credenciales incorrectas. Intentá de nuevo.</div>

      <button type="submit" class="submit-btn">Ingresar</button>
    </form>
  </div>

  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('err').classList.add('visible');
    }

    function togglePw() {
      const input = document.getElementById('password');
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      document.getElementById('eye-icon').innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }
  </script>
</body>
</html>
